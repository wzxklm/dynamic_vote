version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    # [移除] ports 暴露 — 通过 aperag-net 内网访问，无需映射宿主机端口
    networks:
      - internal
      - aperag-net
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgres:5432/vps_vote?schema=public
      - REDIS_URL=redis://redis:6379
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL_LIGHT=${AI_MODEL_LIGHT:-gemini-flash}
      - AI_MODEL_FULL=${AI_MODEL_FULL:-gemini-pro}
      - IP_API_PRIMARY=http://ip-api.com/json
      - IP_API_FALLBACK=https://ipinfo.io
      - IP_API_FALLBACK_TOKEN=${IP_API_FALLBACK_TOKEN:-}
      - RATE_LIMIT_VOTE_PER_HOUR=${RATE_LIMIT_VOTE_PER_HOUR:-10}
      - RATE_LIMIT_IP_LOOKUP_PER_MINUTE=${RATE_LIMIT_IP_LOOKUP_PER_MINUTE:-40}
      - RATE_LIMIT_REPORT_PER_HOUR=${RATE_LIMIT_REPORT_PER_HOUR:-3}
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vps_vote
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  # 服务内部通信网络（app <-> postgres/redis）
  internal:
    driver: bridge
  # 与 nginx 共享的外部网络，nginx 通过服务名 "app" 访问
  aperag-net:
    external: true
